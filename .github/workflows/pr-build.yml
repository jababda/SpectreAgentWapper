name: PR Build

on:
  pull_request:
    paths:
      - 'Podman/**'
      - 'Tests/**'
      - 'SpectreAgentWrapper.sln'
      - '.github/workflows/pr-build.yml'
      - '.github/workflows/publish.yml'
  workflow_dispatch:

jobs:
  image-tests:
    name: Run Image Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Show Podman Info
        run: podman info

      - name: Run Image Smoke Tests
        run: dotnet test ./SpectreAgentWrapper.sln --nologo
