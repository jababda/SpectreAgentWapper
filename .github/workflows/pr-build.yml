name: PR Build

on:
  pull_request:
    paths:
      - 'Podman/**'
      - 'Tests/**'
      - 'SpectreAgentWrapper.sln'
      - '.github/workflows/pr-build.yml'
      - '.github/workflows/publish.yml'
  workflow_dispatch:

jobs:
  image-tests:
    name: Run Image Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Run Image Smoke Tests
        env:
          DOCKER_HOST: unix:///tmp/podman.sock
        run: |
          nohup podman system service --time=0 $DOCKER_HOST >/tmp/podman-system-service.log 2>&1 &
          podman info
          dotnet test ./SpectreAgentWrapper.sln --nologo
