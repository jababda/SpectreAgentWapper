name: Build .NET Application (PR Check)

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build CopilotWrapper
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore src/SpecterAgentWrapper/SpecterAgentWrapper.sln

      - name: Build
        run: dotnet build src/SpecterAgentWrapper/SpecterAgentWrapper.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test src/SpecterAgentWrapper.Tests/SpecterAgentWrapper.Tests.csproj --configuration Release --verbosity normal
