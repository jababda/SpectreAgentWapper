name: Publish Images

on:
  push:
    branches:
      - main
    paths:
      - 'Podman/**'
      - '.github/workflows/publish.yml'
  workflow_dispatch:

jobs:
  image-tests:
    name: Run Image Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Run Image Smoke Tests
        env:
          DOCKER_HOST: unix:///tmp/podman.sock
        run: |
          nohup podman system service --time=0 $DOCKER_HOST >/tmp/podman-system-service.log 2>&1 &
          podman info
          dotnet test ./SpectreAgentWrapper.sln --nologo

  publish-default:
    name: Publish Default Image
    needs: image-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and Push Default Image
        run: |
          podman build -f Podman/dotnet10.Podman -t ghcr.io/${{ github.repository_owner }}/spectre-copilot-default:latest .
          podman push ghcr.io/${{ github.repository_owner }}/spectre-copilot-default:latest
